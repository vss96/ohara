[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
# Windows is intentionally omitted: ort_sys (transitive via fastembed) fails to
# link against MSVC's CRT on the standard runners. WSL users can use the Linux
# x86_64 binary.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Where to host releases
hosting = "github"
# Ship an `<app>-update` helper script alongside the binaries so users
# can self-upgrade without re-running the curl|sh installer. The CLI
# also exposes `ohara update` which calls into axoupdater directly.
install-updater = true
# v0.6.2 multi-dist: the released-binary build wires the CoreML
# execution provider on Apple Silicon. cargo-dist 0.31 does not have
# per-target `features` overrides, so we pass `coreml` to *every*
# target's `cargo build`. `ohara-embed`'s target-conditional `ort`
# dep makes `coreml` a no-op everywhere except `target_os = "macos"`
# (no extra ort weight on Linux artifacts; identical bytes vs v0.6.1
# for non-macOS triples). Source builds (`cargo build --release`)
# stay CPU-only by default â€” the feature only flips on for the
# released binary path. See plan-8 / multi-dist RFC.
features = ["coreml"]
# cargo-dist hardcodes workflow permissions to `contents: write` only. GitHub also
# requires `workflows: write` when `gh release create --target` applies to a commit
# that touches `.github/workflows/**` (403 otherwise; cli/cli#9514). We extend
# `.github/workflows/release.yml` with that scope. With `allow-dirty = ["ci"]`,
# `dist generate` does not overwrite CI; remove `ci` from this list temporarily when
# refreshing generated workflows from a newer cargo-dist, then restore the permissions.
#
# Manual maintenance required after each `dist generate` regen:
#   1. `permissions: contents: write` â†’ also add `workflows: write` (above).
#   2. `runs-on: "ubuntu-22.04"` â†’ `runs-on: "ubuntu-24.04"` for the four
#      orchestration jobs (`plan`, `build-global-artifacts`, `host`,
#      `announce`). These are not driven by `[dist.github-custom-runners]`
#      below â€” that override only flows through `${{ matrix.runner }}` for
#      `build-local-artifacts`. Keeping the orchestration jobs on 24.04
#      matters because some of them run `dist host`, which loads the
#      onnxruntime prebuilt for sanity checks.
allow-dirty = ["ci"]

# Override cargo-dist 0.31's `DEFAULT_LINUX_RUNNER = ubuntu-22.04`. The
# rc.12 onnxruntime prebuilt that fastembed 5.13 transitively pulls
# requires glibc â‰Ą2.38 at runtime; ubuntu-22.04 (glibc 2.35) cannot
# even link the workspace, so released binaries built there would
# silently regress for end users on glibc-2.38+ distros. The static
# runner swaps in `release.yml` (plan / build-global-artifacts / host /
# announce) cover orchestration jobs only; this override is what
# actually moves the binary-producing `build-local-artifacts` matrix
# job to a glibc-2.39 host. Keep these in sync with `release.yml`'s
# `runs-on:` lines.
[dist.github-custom-runners.x86_64-unknown-linux-gnu]
runner = "ubuntu-24.04"

[dist.github-custom-runners.aarch64-unknown-linux-gnu]
runner = "ubuntu-24.04-arm"
