# CI for pull requests and main pushes.
#
# Runs the four checks every change must pass per CONTRIBUTING.md §13:
#   1. cargo fmt --all -- --check       (formatting clean)
#   2. cargo clippy ... -- -D warnings  (lint clean, all targets, all features)
#   3. cargo nextest run --workspace    (tests pass; #[ignore]'d perf tests skipped)
#
# Heavy-by-design tests (the perf harnesses in tests/perf/) are #[ignore]'d
# and excluded from `cargo nextest run --workspace`, so this job stays fast and
# does not need fastembed model downloads or the medium ripgrep fixture.
#
# Security note: this workflow does not consume user-controlled inputs
# (PR titles, commit messages, issue bodies) inside any `run:` block. All
# `run:` commands are static `cargo …` invocations on workspace-derived
# state. Adding any future step that reads `github.event.*` strings into
# a shell command must route them through `env:` first per the GitHub
# script-injection guidance.
#
# Concurrency is keyed on (workflow, ref) with cancel-in-progress so each
# new push to a PR replaces the in-flight run instead of stacking.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain (stable)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: cargo nextest
        run: cargo nextest run --workspace --all-features
